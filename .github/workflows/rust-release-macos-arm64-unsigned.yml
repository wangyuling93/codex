# Fork-local Apple Silicon release: unsigned aarch64-apple-darwin DMG only.
#
# Separate from the canonical multi-platform `rust-release.yml` so this path
# does not own or replace official release semantics.
#
# Zero-config: no secrets, environments, or repo variables. Uses only the
# automatic GITHUB_TOKEN when (optionally) publishing a GitHub Release.
#
# Output:
#   codex-aarch64-apple-darwin.dmg  (+ .tar.gz CLI binaries)
#
# Run:
#   Actions → rust-release-macos-arm64-unsigned → Run workflow
#   Default: upload Actions artifacts only (no GitHub Release / tag).
#   Enable "Publish GitHub Release" to create a prerelease tag:
#     macos-arm64-unsigned-v{Cargo.toml version}

name: rust-release-macos-arm64-unsigned

on:
  workflow_dispatch:
    inputs:
      publish_github_release:
        description: Create a GitHub prerelease (and tag) from the built assets
        required: false
        type: boolean
        default: false
      tag:
        description: >-
          Release tag (macos-arm64-unsigned-vX.Y.Z[...]). Only used when
          publishing. Leave empty to use macos-arm64-unsigned-v{Cargo.toml version}.
        required: false
        type: string
        default: ""

# Default token is read-only; the publish job elevates to write.
permissions:
  contents: read

# Do not cancel in-progress release builds when re-triggered.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}-${{ inputs.tag || 'auto' }}
  cancel-in-progress: false

jobs:
  resolve-version:
    if: ${{ inputs.publish_github_release }}
    runs-on: ubuntu-latest
    outputs:
      release_tag: ${{ steps.resolve.outputs.release_tag }}
      release_version: ${{ steps.resolve.outputs.release_version }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Resolve release tag from Cargo.toml / input
        id: resolve
        shell: bash
        env:
          INPUT_TAG: ${{ inputs.tag }}
          TAG_PREFIX: macos-arm64-unsigned-v
        run: |
          set -euo pipefail

          # Read [workspace.package] version only — not the first "version ="
          # under [workspace.dependencies].
          cargo_ver="$(
            python3 - <<'PY'
          from pathlib import Path
          import re
          import sys

          text = Path("codex-rs/Cargo.toml").read_text()
          match = re.search(
              r"(?ms)^\[workspace\.package\]\s*(.*?)^\[",
              text + "\n[",
          )
          if match is None:
              sys.exit("could not find [workspace.package] in codex-rs/Cargo.toml")
          section = match.group(1)
          version_match = re.search(r'(?m)^version\s*=\s*"([^"]+)"\s*$', section)
          if version_match is None:
              sys.exit("could not find version in [workspace.package]")
          print(version_match.group(1))
          PY
          )"

          if [[ -n "${INPUT_TAG}" ]]; then
            release_tag="${INPUT_TAG}"
          else
            release_tag="${TAG_PREFIX}${cargo_ver}"
          fi

          version_re='[0-9]+\.[0-9]+\.[0-9]+(-(alpha(\.[0-9]+){0,2}|beta(\.[0-9]+)?))?'
          pattern="^${TAG_PREFIX}${version_re}$"
          [[ "${release_tag}" =~ ${pattern} ]] \
            || { echo "❌  Tag '${release_tag}' must match ${TAG_PREFIX}X.Y.Z[...]"; exit 1; }

          tag_ver="${release_tag#"${TAG_PREFIX}"}"
          [[ "${tag_ver}" == "${cargo_ver}" ]] \
            || { echo "❌  Tag version ${tag_ver} ≠ Cargo.toml ${cargo_ver}"; exit 1; }

          {
            echo "release_tag=${release_tag}"
            echo "release_version=${tag_ver}"
          } >> "${GITHUB_OUTPUT}"

          echo "✅  ${release_tag} matches Cargo.toml (${cargo_ver})"

  build:
    name: Build unsigned arm64 DMG
    runs-on: macos-15
    timeout-minutes: 180
    permissions:
      contents: read
    defaults:
      run:
        working-directory: codex-rs
    env:
      CARGO_PROFILE_RELEASE_SPLIT_DEBUGINFO: packed
      CARGO_NET_GIT_FETCH_WITH_CLI: "true"
      TARGET: aarch64-apple-darwin
      # CLI entrypoint + code-mode host (what a local DMG needs).
      BINARIES: "codex codex-code-mode-host"
      STAGE_DIR: dist/release-assets

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - uses: dtolnay/rust-toolchain@e081816240890017053eacbb1bdf337761dc5582 # 1.95.0
        with:
          targets: aarch64-apple-darwin

      - name: Configure rusty_v8 prebuilt artifacts
        uses: ./.github/actions/setup-rusty-v8
        with:
          target: aarch64-apple-darwin

      - name: Cargo build (release)
        shell: bash
        run: |
          set -euo pipefail
          build_args=()
          for binary in ${BINARIES}; do
            build_args+=(--bin "$binary")
          done
          cargo build --locked --target "${TARGET}" --release "${build_args[@]}"

      - name: Strip release binaries
        shell: bash
        run: |
          set -euo pipefail
          # macOS strip only — no unused symbols tarball side product.
          for binary in ${BINARIES}; do
            binary_path="target/${TARGET}/release/${binary}"
            if [[ ! -f "$binary_path" ]]; then
              echo "Binary ${binary_path} not found" >&2
              exit 1
            fi
            strip -S -x "$binary_path"
          done

      - name: Build DMG and stage flat release assets
        shell: bash
        run: |
          set -euo pipefail

          release_dir="target/${TARGET}/release"
          stage="${STAGE_DIR}"
          dmg_root="${RUNNER_TEMP}/codex-dmg-root"
          dmg_name="codex-${TARGET}.dmg"
          dmg_path="${release_dir}/${dmg_name}"

          rm -rf "$stage" "$dmg_root"
          mkdir -p "$stage" "$dmg_root"

          for binary in ${BINARIES}; do
            binary_path="${release_dir}/${binary}"
            if [[ ! -f "$binary_path" ]]; then
              echo "Binary ${binary_path} not found" >&2
              exit 1
            fi
            ditto "$binary_path" "${dmg_root}/${binary}"
            cp "$binary_path" "${stage}/${binary}-${TARGET}"
          done

          hdiutil create \
            -volname "Codex (${TARGET})" \
            -srcfolder "$dmg_root" \
            -format UDZO \
            -ov \
            "$dmg_path"
          cp "$dmg_path" "${stage}/${dmg_name}"

          # Single archive format (.tar.gz) for standalone binaries.
          for f in "$stage"/*; do
            base="$(basename "$f")"
            if [[ "$base" == *.dmg ]]; then
              continue
            fi
            tar -C "$stage" -czf "${stage}/${base}.tar.gz" "$base"
            rm -f "${stage}/${base}"
          done

          echo "Staged release assets:"
          ls -lah "$stage"

      - name: Upload release assets
        uses: actions/upload-artifact@bbbca2ddaa5d8feaa63e36b76fdaad77386f024f # v7.0.0
        with:
          name: macos-arm64-unsigned
          path: codex-rs/dist/release-assets/*
          if-no-files-found: error
          retention-days: 14

  publish:
    if: ${{ inputs.publish_github_release }}
    needs:
      - resolve-version
      - build
    name: Publish GitHub Release
    runs-on: ubuntu-latest
    permissions:
      contents: write
      actions: read

    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Download release assets
        uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: macos-arm64-unsigned
          path: release-assets

      - name: Verify DMG present
        shell: bash
        run: |
          set -euo pipefail
          dmg="release-assets/codex-aarch64-apple-darwin.dmg"
          if [[ ! -f "$dmg" ]]; then
            echo "❌  ${dmg} not found" >&2
            ls -lahR release-assets || true
            exit 1
          fi
          ls -lah release-assets/

      - name: Release notes
        id: notes
        shell: bash
        run: |
          set -euo pipefail
          notes_path="${RUNNER_TEMP}/release-notes.md"
          {
            echo "Unsigned Apple Silicon (aarch64-apple-darwin) build."
            echo
            echo "Primary asset: \`codex-aarch64-apple-darwin.dmg\`"
            echo
            echo "Built from \`${GITHUB_SHA}\`."
            echo
            git log -1 --format=%B "${GITHUB_SHA}^{commit}"
          } > "${notes_path}"
          echo "path=${notes_path}" >> "${GITHUB_OUTPUT}"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@153bb8e04406b158c6c84fc1615b65b24149a1fe # v2.6.1
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          name: ${{ needs.resolve-version.outputs.release_version }} (macos-arm64-unsigned)
          tag_name: ${{ needs.resolve-version.outputs.release_tag }}
          target_commitish: ${{ github.sha }}
          body_path: ${{ steps.notes.outputs.path }}
          files: release-assets/*
          overwrite_files: true
          fail_on_unmatched_files: true
          make_latest: false
          prerelease: true
